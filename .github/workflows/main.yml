name: review
on: [push]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Install Vale
        run: |
          sudo apt-get update
          sudo apt-get install -y vale

      - name: Sync Vale styles
        run: |
          mkdir -p .vale/styles
          vale sync
      
      - name: Run Vale
        run: vale --no-exit challenges

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run spec checker
        run: |
          python scripts/check.py
